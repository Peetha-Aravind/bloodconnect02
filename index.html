<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BloodConnect — Save Lives Together</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-art"></div>
  <div class="bg-grid"></div>

  <div id="landing" class="screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px;">
    <div>
      <div class="hero-tag">🩸 Emergency Blood Network</div>
      <h1 class="hero-title">BLOOD<span class="accent">CONNECT</span></h1>
      <p class="hero-sub">A real-time platform connecting blood donors with those in need. Every second counts — be the reason someone survives.</p>
      
      <div class="landing-btns">
        <a href="login-donor.html" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Register as Donor
        </a>
        <a href="login-finder.html" class="btn btn-outline">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Find Emergency Blood
        </a>
        <a href="login-donor.html" class="btn btn-ghost">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Login
        </a>
      </div>

      <div class="stats-row">
        <div class="stat-item"><div class="stat-num">3M+</div><div class="stat-label">Lives Saved</div></div>
        <div class="stat-item"><div class="stat-num">50K</div><div class="stat-label">Active Donors</div></div>
        <div class="stat-item"><div class="stat-num">8</div><div class="stat-label">Blood Types</div></div>
        <div class="stat-item"><div class="stat-num">24/7</div><div class="stat-label">Emergency Ready</div></div>
      </div>
    </div>
  </div>
</body>
</html>
