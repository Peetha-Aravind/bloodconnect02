<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donor Login - BloodConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-art"></div>
  <div class="bg-grid"></div>

  <nav>
    <div class="logo">Blood<span>Connect</span></div>
  </nav>

  <div style="display:flex; align-items:center; justify-content:center; padding:40px 20px; min-height: calc(100vh - 80px);">
    <div class="auth-box">
      <div class="auth-badge">🩸 Donor Portal</div>
      <h2 class="auth-title">Welcome,<br/>Hero.</h2>
      <p class="auth-sub">Sign in with your Google account to register as a blood donor or access your donor dashboard.</p>
      
      <button class="btn-google" style="width:100%" id="btn-login">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <a href="index.html" class="back-link">← Back to Home</a>
    </div>
  </div>

  <div class="loading-overlay" id="loading">
    <div class="loading-box">
      <div class="spinner" style="width:36px;height:36px;border-width:3px"></div>
      <p id="loading-msg">Please wait...</p>
    </div>
  </div>
  <div id="toast"></div>

  <script type="module">
    import { auth, signInWithPopup, provider, db, getDoc, doc } from "./firebase-config.js";
    import { showLoading, hideLoading, toast } from "./utils.js";

    document.getElementById('btn-login').addEventListener('click', async () => {
      showLoading('Signing in with Google…');
      try {
        const result = await signInWithPopup(auth, provider);
        const snap = await getDoc(doc(db, 'donors', result.user.uid));
        hideLoading();
        if (snap.exists()) {
          window.location.href = 'donor-dashboard.html';
        } else {
          window.location.href = 'onboarding.html';
        }
      } catch (e) {
        hideLoading();
        toast('Sign-in failed: ' + (e.message || 'Unknown error'), 'error');
      }
    });
  </script>
</body>
</html>
